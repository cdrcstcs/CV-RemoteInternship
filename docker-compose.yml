version: "3.9"
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"

  backend:
    build: ./backend
    environment:
      - DB_HOST=mongodb
      - REDIS_HOST=redis
      - STRIPE_KEY=${STRIPE_KEY}
    depends_on:
      - mongodb
      - redis
    ports:
      - "9000:9000"

  mongodb:
    image: mongo:6
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  mongo-data: